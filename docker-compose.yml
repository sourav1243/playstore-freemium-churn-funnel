services:
  analytics:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./warehouse.duckdb:/app/warehouse.duckdb
      - ./dashboard/exports:/app/dashboard/exports
      - ./reports:/app/reports
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    command: >
      sh -c "python src/run_pipeline.py && streamlit run src/app.py --server.port=8501 --server.address=0.0.0.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
