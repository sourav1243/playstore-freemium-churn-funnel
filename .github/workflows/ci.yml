name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff black isort
      - run: ruff check src/ tests/
      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run full pipeline
        run: python src/run_pipeline.py
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
      - name: Verify outputs
        run: |
          test -f data/processed/funnel_summary.csv
          test -f data/processed/cohort_retention.csv
          test -f data/processed/ab_test_results.csv
          test -f data/processed/model_feature_importance.csv
          test -f reports/figures/retention_heatmap.png
          test -f reports/interactive_dashboard.html
          test -f reports/business_recommendation.md
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-outputs-${{ matrix.python-version }}
          path: |
            reports/
            data/processed/
          retention-days: 7

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:latest,${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}:{1}', github.repository, github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
